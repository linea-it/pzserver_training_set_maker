##################################################################
# Parameters file. Should follow the syntax defined in:
# http://docs.ansible.com/ansible/latest/YAMLSyntax.html
# More general reference: http://www.yaml.org/spec/1.2/spec.html

executor: 
  name: "local"   # or "slurm"
  args:
    n_workers: 2
    threads_per_worker: 2
    memory_limit: "1GiB"
  # args:
  #   instance:
  #     cores: 16
  #     processes: 4
  #     memory: "48GB"
  #     queue: "cpu_small"
  #     account: "hpc-public"
  #     job_extra_directives:
  #       - "--propagate"
  #       - "--time=2:00:00"
  #   adapt:
  #     maximum_jobs: 12

inputs:
  dataset:
    path: "<DATASETS_DIR>/dr2"
    columns:
      id: "id"
  specz:
    - path: "<DATASETS_DIR>/specz.parquet"
      format: "parquet"
      # format: "hats"
      columns:
        ra: "ra"
        dec: "dec"
        z: "z"

output_dir: "outputs"
# Supported output formats: specz, csv, fits, parquet, hdf5, hats
output_format: "csv"
output_name: "tsm"

param:
  use_absolute_lsdb_path: false
  selected_cols: []
  flux_type: "auto"
  convert_flux_to_mag: true
  dereddening: "sfd"
  split_method: "random"
  train_fraction: 0.7
  random_seed: null
  crossmatch:
    radius_arcsec: 1.0
    n_neighbors: 1
